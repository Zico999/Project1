<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Summariser</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #c9a96e 0%, #8B4513 100%); color:#2d3748; margin:0; padding:20px; }
.container { max-width:900px; margin:0 auto; }
h1 { text-align:center; color:white; margin-bottom:20px; text-shadow:0 2px 4px rgba(0,0,0,0.2); }
textarea { width:100%; min-height:400px; padding:14px; border-radius:10px; border:2px solid #e2e8f0; font-size:1rem; font-family:inherit; resize:vertical; }
button { margin-top:20px; width:100%; padding:14px; font-size:1.05rem; font-weight:600; border:none; border-radius:10px; cursor:pointer; background:linear-gradient(135deg, #c9a96e 0%, #8B4513 100%); color:white; transition:0.2s; }
button:hover:not(:disabled) { opacity:0.92; transform:translateY(-1px); }
button:disabled { opacity:0.6; cursor:not-allowed; }
#summaryOutput { margin-top:20px; background:#fdf8f3; border:2px solid #e8d5b7; padding:20px; border-radius:10px; white-space:pre-wrap; }
#errorBox { color:red; margin-top:12px; }
</style>
</head>
<body>
<div class="container">
  <h1>📄 Text Summariser</h1>
  <textarea id="inputText" placeholder="Paste your document here..."></textarea>
  <div id="errorBox"></div>
  <button onclick="summarise()">✨ Summarise</button>
  <div id="summaryOutput" style="display:none"></div>
</div>

<script>
async function summarise() {
  const text = document.getElementById("inputText").value.trim();
  const errorBox = document.getElementById("errorBox");
  const out = document.getElementById("summaryOutput");
  const btn = document.querySelector("button");
  errorBox.textContent = "";
  out.style.display = "none";

  if(text.split(/\s+/).length < 10) { errorBox.textContent="Please enter at least 10 words"; return; }

  btn.disabled=true; btn.textContent="⏳ Summarising...";

  try {
    const res = await fetch("/api/summarise", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ text, length:"medium", style:"concise", focus:"general" })
    });

    if(!res.headers.get("content-type")?.includes("application/json")) throw new Error("Server did not return JSON");

    const data = await res.json();
    if(data.error) throw new Error(data.error);

    out.textContent=data.summary;
    out.style.display="block";

  } catch(err) { errorBox.textContent="❌ "+err.message; }
  finally { btn.disabled=false; btn.textContent="✨ Summarise"; }
}
</script>
</body>
</html>
