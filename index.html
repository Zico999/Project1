<!DOCTYPE html>
<html>
<head>
<title>Ele's Big Daft Summary Machine</title>
<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:40px;
background:#f5f5f5;
}
textarea{
width:100%;
height:200px;
padding:10px;
font-size:14px;
}
button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
#output{
margin-top:20px;
padding:15px;
background:white;
border:1px solid #ddd;
}
</style>
</head>

<body>

<h1>📄 Ele's Big Daft Summary Machine</h1>

<textarea id="text" placeholder="Paste text here..."></textarea>

<br>
<button onclick="summarise()">Summarise</button>

<div id="output"></div>

<script>

async function summarise(){

const text = document.getElementById("text").value;

if(!text){
alert("Paste some text first");
return;
}

document.getElementById("output").innerText = "Summarising...";

const response = await fetch("/api/summarise",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text
})
});

const data = await response.json();

if(data.error){
document.getElementById("output").innerText = data.error;
return;
}

document.getElementById("output").innerText = data.summary;

}

</script>

</body>
</html>
