<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ele's Big Daft Summary Machine</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg, #c9a96e 0%, #8B4513 100%);
    padding:30px 20px;
    color:#2d3748;
  }
  .container { max-width:900px; margin:0 auto; }
  header { text-align:center; padding:30px 0 20px; color:white; }
  header h1 { font-size:2.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
  header p { opacity:0.9; margin-top:8px; }

  textarea {
    width: 100%;
    min-height: 400px;       /* Bigger input box */
    max-height: 700px;
    padding: 18px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    margin-bottom: 18px;
  }
  textarea:focus { border-color:#c9a96e; }

  .options {
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:18px;
    font-weight:600;
  }
  select {
    padding:10px 14px;
    border:2px solid #e2e8f0;
    border-radius:10px;
    font-size:1rem;
    outline:none;
    cursor:pointer;
  }
  select:focus { border-color:#c9a96e; }

  button {
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#c9a96e,#8B4513);
    color:white;
    font-weight:600;
    cursor:pointer;
    font-size:1.05rem;
    transition:opacity 0.2s, transform 0.1s;
    margin-bottom:18px;
  }
  button:hover { opacity:0.92; transform:translateY(-1px); }

  .summary-box {
    background:#fdf8f3;
    border:2px solid #e8d5b7;
    border-radius:12px;
    padding:22px;
    line-height:1.8;
    white-space:pre-wrap;
    margin-top:12px;
    font-size:1rem;
  }

  .error { color:#c53030; margin-top:12px; font-weight:600; }
</style>
</head>
<body>
<div class="container">
<header>
  <h1>📄 Ele's Big Daft Summary Machine</h1>
  <p>Paste text and get an AI-powered summary</p>
</header>

<textarea id="inputText" placeholder="Paste your text here..."></textarea>

<div class="options">
  <label>Length:
    <select id="summaryLength">
      <option value="short">Short</option>
      <option value="medium" selected>Medium</option>
      <option value="long">Long</option>
    </select>
  </label>

  <label>Style:
    <select id="summaryStyle">
      <option value="concise">Concise</option>
      <option value="bullet">Bullet Points</option>
      <option value="formal">Formal</option>
      <option value="simple">Simple</option>
    </select>
  </label>

  <label>Focus:
    <select id="summaryFocus">
      <option value="general" selected>General</option>
      <option value="key points">Key Points</option>
      <option value="action items">Action Items</option>
      <option value="conclusions">Conclusions</option>
    </select>
  </label>
</div>

<button id="summariseBtn">✨ Summarise</button>

<div class="error" id="errorBox"></div>
<div class="summary-box" id="summaryOutput"></div>
</div>

<script>
const inputText = document.getElementById("inputText");
const summaryLength = document.getElementById("summaryLength");
const summaryStyle = document.getElementById("summaryStyle");
const summaryFocus = document.getElementById("summaryFocus");
const summaryOutput = document.getElementById("summaryOutput");
const errorBox = document.getElementById("errorBox");
const summariseBtn = document.getElementById("summariseBtn");

summariseBtn.addEventListener("click", async () => {
  const text = inputText.value.trim();
  if(!text){ errorBox.textContent="Please enter some text"; return; }

  errorBox.textContent="";
  summaryOutput.textContent="⏳ Summarising...";

  try{
    const res = await fetch("/api/summarise",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        text,
        length:summaryLength.value,
        style:summaryStyle.value,
        focus:summaryFocus.value
      })
    });

    const data = await res.json();
    if(res.ok){ summaryOutput.textContent = data.summary; }
    else{ summaryOutput.textContent=""; errorBox.textContent = "Error: "+(data.error||"Unknown error"); }

  }catch(err){
    summaryOutput.textContent="";
    errorBox.textContent="Error: "+err.message;
  }
});
</script>
</body>
</html>
